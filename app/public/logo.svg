<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#00a8ff"/>
      <stop offset="100%" stop-color="#0072ce"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#9be7ff"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Arco/portal em forma de "A" -->
  <g filter="url(#glow)">
    <path d="M128 408 V216 a128 128 0 0 1 256 0 V408"
          fill="none" stroke="url(#arc)" stroke-width="42" stroke-linecap="round"/>
  </g>
  <g filter="url(#glow)">
    <!-- travessão do A, levemente ascendente -->
    <path d="M196 330 L316 296"
          fill="none" stroke="url(#arc)" stroke-width="34" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Losango de jogo no centro do portal -->
  <g filter="url(#glow)">
    <path d="M256 156 L310 210 L256 264 L202 210 Z" fill="url(#spark)"/>
  </g>
</svg>
